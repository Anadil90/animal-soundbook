<!DOCTYPE html>
<html lang="en-US">
    <head>
        <title>Animal Soundbook</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial.scale=1.0">
        <link rel="stylesheet" href="./css/styles.css">
    </head>

    <body><!--body contains header, and main section with clickable tiles, and footer-->
        <header>
            <a href="#home" id="home">Home</a><!--main home link-->

            <span id="right-links"><!--span separates the home link from the links on the right-->
                <a href="#about">About</a>
                <a href="#language">Language</a><!--language toggler-->
                <a href="#contact">Contact</a>
            </span>
        </header>

        <section id="main-content"><!--sections groups the tiles together-->
            <figure class="animal-tiles"><!--main container for each of the tiles-->
                <figcaption class="img-caption">Giraffe</figcaption>
                <section>
                    <img 
                    src="./images/valeria-hutter-0FdCO4C_R8M-unsplash.jpg" alt="image of a giraffe" width="190px"
                    height="140px"
                    >
                    <audio>Giraffe</audio><!--plays the sound of the animal being clicked on-->
                    <figcaption>Photo by <a href="https://unsplash.com/@valeria_h?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Valeria Hutter</a> on <a href="https://unsplash.com/photos/giraffe-standing-on-brown-field-during-daytime-0FdCO4C_R8M?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
      </figcaption>
                </section>
                
            </figure>

            <figure class="animal-tiles"><!--main container for each of the tiles-->
                <figcaption class="img-caption">Nilpferd</figcaption>
                <section>
                    <img 
                    src="./images/stefan-hippo-unsplash.jpg" alt="image of a hippo in the water" width="190px"
                    height="140px"
                    >
                    <audio>Hippopotamos</audio><!--plays the sound of the animal being clicked on-->
                    <figcaption>Photo by <a href="https://unsplash.com/@usinglight?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Stefan Steinbauer</a> on <a href="https://unsplash.com/photos/gray-hipopotamos-1O1hLL-v7Hc?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
      </figcaption>
                </section>
                
            </figure>

            <figure class="animal-tiles"><!--main container for each of the tiles-->
                <figcaption class="img-caption">Hund</figcaption>
                <section>
                    <img src="./images/petfoto-dog-8198719_640.jpg" alt="image of a dog" width="190px" height="140px">
                    <audio>Dog</audio><!--plays the sound of the animal being clicked on-->
                    <figcaption>Photo by <a href="https://pixabay.com/de/users/petfoto-34205568/?utm_source=link-attribution&utm_medium=referral&utm_campaign=image&utm_content=8198719">Foden Nguyen</a> auf <a href="https://pixabay.com/de//?utm_source=link-attribution&utm_medium=referral&utm_campaign=image&utm_content=8198719">Pixabay</a></figcaption>
                </section>
                
            </figure>

            <figure class="animal-tiles"><!--main container for each of the tiles-->
                <figcaption class="img-caption">Katze</figcaption>
                <section>
                    <img src="./images/jaclou-dl-cat-5098930_640.jpg" alt="image of a cat" width="190px" height="140px">
                    <audio>Cat</audio><!--plays the sound of the animal being clicked on-->
                    <figcaption>Photo by <a href="https://pixabay.com/de/users/jaclou-dl-5602247/?utm_source=link-attribution&utm_medium=referral&utm_campaign=image&utm_content=5098930">JackieLou DL</a> auf <a href="https://pixabay.com/de//?utm_source=link-attribution&utm_medium=referral&utm_campaign=image&utm_content=5098930">Pixabay</a></figcaption>
                </section>
            </figure>
        </section>

        <footer id="footer">
            <a href="#contact">Contact</a>
            <a href="#home" id="home">Home</a><!--main home link-->
        </footer>
    </body>
</html>
