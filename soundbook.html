<!DOCTYPE html>
<html lang="en-US">

<head>
    <title>Animal Soundbook</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial.scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
    <!--body contains header, and main section with the call to action text, followed by a description of what the website is, and 
              what it aims to offer. Then comes the call to action button  that takes the user to the clickable tiles.-->


    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Animal Soundbook</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Sign up</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!--main grid container container containing animal tiles-->
    <section class="main-container mb-4">
        <div class="col-12 col-md-6">
            <div class="card mb-3">
                <img src="./images/valeria-hutter-0FdCO4C_R8M-unsplash.jpg" class="card-img-top"
                    alt="Image of a giraffe walking accross a dusty road.">
                <div class="card-body">
                    <h3 class="card-title">Giraffe</h3>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-6">
            <div class="card mb-3">
                <img src="./images/stefan-steinbauer-hippo-large.jpg" class="card-img-top"
                    alt="image of a hippo in the water">
                <div class="card-body">
                    <h3 class="card-title">Hippopotamos</h3>

                </div>
            </div>
        </div>
        <div class="col-12 col-md-6">
            <div class="card mb-3 sharp-corners">
                <img src="./images/jaclou-dl-cat-5098930_640.jpg" class="card-img-top" alt="image of a cat">
                <div class="card-body">
                    <h3 class="card-title">Cat</h3>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-6">
            <div class="card mb-3 sharp-corners">
                <img src="./images/petfoto-dog-8198719_640.jpg" class="card-img-top"
                    alt="Image of a dog against a background.">
                <div class="card-body">
                    <h3 class="card-title">Dog</h3>
                </div>
            </div>
        </div>
        </div>
    </section>


    <footer id="footer">
        <a href="#contact">Contact</a>
        <a href="#home" id="home">Home</a><!--main home link-->
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
