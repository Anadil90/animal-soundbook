    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>

    <nav class="navbar navbar-expand-sm bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Animal Soundbook</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="./index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./about.html">About</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="./contact.html">Contact</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="./signup.html">Sign up</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section id="main" class="main-content">
        <div class="container">
            <form class="row g-2">
                    <div class="col-lg-4">
                        <label for="first-name" class="form-label">First Name</label>
                        <input type="text" class="form-control" id="first-name" required>
                    </div>
                    <div class="col-lg-4">
                        <label for="last-name" class="form-label">Last name</label>
                        <input type="text" class="form-control" id="last name" required>
                    </div>

                    <div class="col-lg-4">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>

                   <div class="col-lg-4">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password">
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary custom-button">Send</button>
                    </div>
                    <h1>Sign up to the website and get personalised options to design your soundboard with fun colors,
                        and layout. let's start!
                    </h1>
                </form>
    </section>


    <footer id="footer">
        <a href="./contact.html" class="footer-links">Contact</a>
        <a href="./index.html" id="home" class="footer-links">Home</a><!--main home link-->
        <a class="nav-link footer-links" href="./about.html">About</a>
